strategies:
  - name: "RSI超买做空"
    conditions:
      - indicator: rsi_14
        operator: ">"
        value: 55
        timeframe: "1h"
      - indicator: macd_histogram_12_26_9
        operator: "<"
        value: 0
        timeframe: "1h"
    logic: AND
    action:
      side: short
      type: market
      size_pct: 3
    stop_loss_pct: 5
    take_profit_pct: 4

  - name: "MACD金叉做多"
    conditions:
      - indicator: macd_line_12_26_9
        cross: above
        reference: macd_signal_12_26_9
        timeframe: "4h"
    logic: AND
    action:
      side: long
      type: market
      size_pct: 10
    stop_loss_pct: 2
    take_profit_pct: 4
